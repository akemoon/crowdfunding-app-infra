apiVersion: batch/v1
kind: Job
metadata:
  name: minio-init
  namespace: data
spec:
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: mc
          image: minio-init:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef:
                  name: minio-secrets
                  key: MINIO_ACCESS_KEY
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: minio-secrets
                  key: MINIO_SECRET_KEY
          command:
            - /bin/sh
            - -c
            - |
              mc alias set local http://minio.data.svc.cluster.local:9000 $MINIO_ROOT_USER $MINIO_ROOT_PASSWORD
              mc mb --ignore-existing local/avatars
              mc anonymous set download local/avatars
              mc cp /default-avatars/ local/avatars/defaults/ --recursive
